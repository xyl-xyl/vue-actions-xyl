on: push

jobs:
  pnpm-build:
    name: pnpm build工作
    runs-on: ubuntu-latest
    steps:
      - name: 打印当前目录
        run: pwd
      - name: 安装pnpm
        run: install pnpm
      - name: 安装依赖pnpm包
        run: pnpm install
      - name: 检查pnpm包
        run: pnpm run lint
      - name: 构建项目
        run: pnpm run build
